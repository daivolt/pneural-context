version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: pneural
      POSTGRES_USER: pneural
      POSTGRES_PASSWORD: pneural_dev
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  pneural-context:
    build: .
    environment:
      PNEURAL_DATABASE_URL: postgresql://pneural:pneural_dev@postgres:5432/pneural
      PNEURAL_LLM_URL: http://localhost:12345/v1
      PNEURAL_LLM_MODEL: local-model
      PNEURAL_HOST: "0.0.0.0"
      PNEURAL_PORT: "8777"
    ports:
      - "8777:8777"
    depends_on:
      - postgres

volumes:
  pgdata: