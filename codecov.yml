codecov:
  require_ci_to_pass: true
  notify:
    wait_for_ci: true

coverage:
  precision: 2
  round: down
  range: "70...100"
  status:
    project:
      default:
        target: 70%
        threshold: 2%
        if_ci_failed: error
    patch:
      default:
        target: 70%
        threshold: 5%

comment:
  layout: "header, diff, files, footer"
  behavior: default
  require_changes: true

ignore:
  - "pneural_context/cli.py"
  - "pneural_context/mcp_server/**"
  - "pneural_context/pb_server.py"
  - "tests/**"
  - "alembic/**"
