name: CI

on:
  workflow_dispatch:
    inputs:
      target:
        description: "Deploy target: mediserv or ryzen"
        required: true
        default: mediserv
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dependencies
        run: pip install -e ".[dev]"
      - name: Ruff lint
        run: ruff check .
      - name: Ruff format check
        run: ruff format --check .

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dependencies
        run: pip install -e ".[dev]"
      - name: Mypy type check
        run: mypy pneural_context/

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: pneural_test
          POSTGRES_USER: pneural
          POSTGRES_PASSWORD: pneural_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install dependencies
        run: pip install -e ".[dev]"
      - name: Run unit tests
        env:
          PNEURAL_DATABASE_URL: postgresql://pneural:pneural_test@localhost:5432/pneural_test
        run: |
          pytest tests/ -v --tb=long -m "not integration" --ignore=tests/poc --cov=pneural_context --cov-report=term-missing --cov-report=xml --no-cov-on-fail
      - name: Upload coverage
        if: matrix.python-version == '3.12'
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

  integration:
    runs-on: ubuntu-latest
    needs: [lint, typecheck, test]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: pneural_test
          POSTGRES_USER: pneural
          POSTGRES_PASSWORD: pneural_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dependencies
        run: pip install -e ".[dev]"
      - name: Run integration tests
        env:
          PNEURAL_DATABASE_URL: postgresql://pneural:pneural_test@localhost:5432/pneural_test
        run: |
          pytest tests/ -v -m "integration" || echo "Integration tests failed (non-blocking)"

  secrets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_CONFIG: .gitleaks.toml

  deploy:
    runs-on: ubuntu-latest
    needs: [lint, typecheck, test]
    if: github.event_name == 'workflow_dispatch'
    environment: production
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - name: Deploy to mediserv
        if: github.event.inputs.target == 'mediserv'
        uses: appleboy/ssh-action@v1
        with:
          host: 100.126.64.13
          username: daivolt
          password: ${{ secrets.MEDISERV_SSH_PASS }}
          script: |
            cd /opt/pneural-context
            git pull origin main
            /opt/pneural-context/.venv/bin/pip install -e ".[dev]" 2>/dev/null || true
            echo "icaro9" | sudo -S systemctl restart pneural-context
            sleep 5
            curl -sf http://localhost:8778/health || { echo "Healthcheck failed"; exit 1; }
      - name: Deploy to ryzen
        if: github.event.inputs.target == 'ryzen'
        uses: appleboy/ssh-action@v1
        with:
          host: 10.42.0.89
          username: daivolt
          password: ${{ secrets.RYZEN_SSH_PASS }}
          script: |
            cd C:\pneural-context
            git pull origin main
            C:\pneural-context\.venv\Scripts\pip.exe install -e ".[dev]"
            powershell -Command "Start-ScheduledTask -TaskName PneuralContext"
            powershell -Command "Start-Sleep -Seconds 5; try { Invoke-RestMethod -Uri http://localhost:8779/health } catch { Write-Error 'Healthcheck failed'; exit 1 }"
