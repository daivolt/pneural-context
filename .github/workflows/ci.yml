name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: pneural_test
          POSTGRES_USER: pneural
          POSTGRES_PASSWORD: pneural_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          pip install -e ".[dev]"

      - name: Compile check
        run: |
          python -m py_compile pneural_context/__init__.py
          python -m py_compile pneural_context/pb_config.py
          python -m py_compile pneural_context/pb_db.py
          python -m py_compile pneural_context/pb_llm.py
          python -m py_compile pneural_context/pb_engine.py
          python -m py_compile pneural_context/pb_memoria.py
          python -m py_compile pneural_context/pb_server.py
          python -m py_compile pneural_context/pb_dashboard.py
          python -m py_compile pneural_context/cli.py

      - name: Run unit tests
        env:
          PNEURAL_DATABASE_URL: postgresql://pneural:pneural_test@localhost:5432/pneural_test
        run: |
          pytest tests/ -v -m "not integration"

      - name: Run integration tests
        if: false
        run: |
          pytest tests/test_e2e.py -v